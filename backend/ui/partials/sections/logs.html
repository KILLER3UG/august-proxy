            <section id="section-logs" class="dashboard-section hidden space-y-6">

                        <div class="flex items-center gap-3">
                            <div class="section-icon bg-gradient-to-br from-amber-500 to-orange-500 text-white">

                        <button class="log-filter-btn px-3 py-1.5 rounded-lg text-xs font-semibold transition" data-filter="system" onclick="switchLogFilter('system')">System</button>
                        <button class="log-filter-btn px-3 py-1.5 rounded-lg text-xs font-semibold transition" data-filter="errors" onclick="switchLogFilter('errors')">Errors</button>
                    </div>
                    <div id="logList" class="divide-y divide-slate-100 dark:divide-slate-800 max-h-[600px] overflow-y-auto">

                    </div>
                </div>
