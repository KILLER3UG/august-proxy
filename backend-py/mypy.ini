[mypy]
# mypy strict is the target — matches the active python-backend branch work.
# Start with --strict but allow gradual tightening via per-module overrides below.
python_version = 3.12
mypy_path = app

# Show column numbers and error codes for cleaner reports.
show_column_numbers = True
show_error_codes = True
pretty = True

# Skip the project's app/types.py because it shadows the stdlib `types`
# module (which mypy needs to be unique). Phase 4 will rename it.
exclude = (?x)(^app/scripts/.*\.py$)

# Tooling & scripts are dynamic by nature
[mypy-app.scripts.*]
ignore_errors = True

# Tests get relaxed rules
[mypy-tests.*]
ignore_errors = True

# Third-party / optional deps that ship without type stubs (or are win32-only
# optional extras). Silencing missing-import errors for these lets --strict mode
# focus on real type bugs in our own code instead of noise from untyped libraries.
[mypy-psutil]
ignore_missing_imports = True
[mypy-pyautogui]
ignore_missing_imports = True
[mypy-pygetwindow]
ignore_missing_imports = True
[mypy-pywinpty]
ignore_missing_imports = True
[mypy-watchdog.*]
ignore_missing_imports = True
[mypy-ddgs]
ignore_missing_imports = True
[mypy-playwright.*]
ignore_missing_imports = True
[mypy-xlsx]
ignore_missing_imports = True
[mypy-mammoth]
ignore_missing_imports = True
[mypy-katex]
ignore_missing_imports = True
[mypy-pdfjs_dist]
ignore_missing_imports = True

