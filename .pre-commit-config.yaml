# Pre-commit hooks for August Proxy.
# Install once (from repo root):
#   Windows (recommended — Device Guard safe):
#     py -3 -m pip install pre-commit
#     .\scripts\install-git-hooks.ps1
#   Unix / unblocked venv:
#     pip install pre-commit
#     pre-commit install
# Run all:  pre-commit run --all-files
#
# If commits fail with "Permission denied" on backend-py/.venv/Scripts/python.exe,
# see docs/TROUBLESHOOTING.md (Device Guard) and re-run install-git-hooks.ps1.
#
# Naming policy (Phase 0 sign-off): Python identifiers stay camelCase.
# pep8-naming is intentionally not enabled. Frontend lint stays with ESLint.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      # Lint critical rules only (see [tool.ruff] in backend-py/pyproject.toml).
      - id: ruff
        name: ruff (backend-py)
        args: [--fix]
        files: ^backend-py/
        exclude: |
          (?x)(
            \.bak$
            | __pycache__
            | august_proxy\.egg-info
            | scripts/
          )

      # Formatter intentionally not forced yet — avoids a repo-wide reformat
      # on first install. Enable in a dedicated formatting PR later:
      # - id: ruff-format
      #   name: ruff-format (backend-py)
      #   files: ^backend-py/
