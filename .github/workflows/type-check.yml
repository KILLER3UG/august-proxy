name: Type check

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-mypy:
    name: Backend — mypy + ruff + pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-py
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend-py/pyproject.toml

      - name: Install backend (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check .

      - name: Run mypy
        run: python -m mypy app/

      # Full suite includes Phase 7 inventory E2E, feature_flow live-backend
      # emission during tool stages, proxy inject HTTP, SSRF gates, gateway
      # normalize paths (no live bot credentials required).
      - name: Run pytest
        run: pytest -q --tb=short

  frontend-tsc-eslint:
    name: Frontend — tsc + eslint + vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web (tsc + vite)
        run: npm run build:web

      - name: eslint
        run: npm run lint -w frontend/desktop

      # Phase 7 UI inventory (Feature Flow, AUG toggle, collaboration banners,
      # marquee titles). Live backend SSE is covered by backend pytest; vitest
      # proves the desktop consumers of that stream.
      - name: vitest
        run: npm run test -w frontend/desktop

  mobile-typecheck:
    name: Mobile — typecheck + parity audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Mobile test (tsc + parity audit)
        run: npm run test -w frontend/mobile
