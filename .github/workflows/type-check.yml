name: Type check

on:
  push:
    branches: [master, python-backend]
  pull_request:
    branches: [master, python-backend]

jobs:
  backend-mypy:
    name: Backend — mypy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-py
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run mypy
        run: mypy app/

      - name: Run pytest
        run: pytest -q

  frontend-tsc-eslint:
    name: Frontend — tsc + eslint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/desktop
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: tsc --noEmit
        run: npm run typecheck

      - name: eslint
        run: npm run lint