            <section id="section-traffic" class="dashboard-section hidden">
                <div class="surface overflow-hidden rounded-3xl">
                    <div class="px-5 py-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="section-icon bg-gradient-to-br from-indigo-500 to-blue-600 text-white">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                            </div>
                            <h2 class="text-sm font-bold text-slate-700 dark:text-slate-200 uppercase tracking-wider">Request Traffic</h2>
                        </div>
                        <div class="flex gap-1 bg-slate-100 dark:bg-slate-800 p-0.5 rounded-lg">
                            <button onclick="setPeriod('all')" data-period="all" class="period-btn text-[11px] px-3 py-1 rounded-md bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 font-medium shadow-sm transition">All</button>
                            <button onclick="setPeriod('day')" data-period="day" class="period-btn text-[11px] px-3 py-1 rounded-md text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition">Day</button>
                            <button onclick="setPeriod('week')" data-period="week" class="period-btn text-[11px] px-3 py-1 rounded-md text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition">Week</button>
                            <button onclick="setPeriod('month')" data-period="month" class="period-btn text-[11px] px-3 py-1 rounded-md text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition">Month</button>
                            <button onclick="setPeriod('year')" data-period="year" class="period-btn text-[11px] px-3 py-1 rounded-md text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition">Year</button>
                        </div>
                    </div>

                    <div class="grid gap-3 px-5 py-4 border-b border-slate-100 dark:border-slate-700 md:grid-cols-[minmax(0,1fr)_minmax(0,1fr)_auto]">
                        <div>
                            <label class="block text-[11px] font-semibold text-slate-500 dark:text-slate-400 uppercase">Request Log Limit</label>
                            <input type="number" id="requestLogLimit" min="100" step="100" class="minimal-input mt-1 block w-full rounded-xl p-2.5 text-xs font-mono" placeholder="5000">
                        </div>
                        <div>
                            <label class="block text-[11px] font-semibold text-slate-500 dark:text-slate-400 uppercase">Pending Timeout (Minutes)</label>
                            <input type="number" id="pendingTimeoutMinutes" min="1" step="1" class="minimal-input mt-1 block w-full rounded-xl p-2.5 text-xs font-mono" placeholder="10">
                        </div>
                        <div class="flex items-end">
                            <button onclick="saveTrafficSettings()" class="minimal-button rounded-xl px-4 py-2.5 text-xs font-semibold w-full md:w-auto">Save Traffic Settings</button>
                        </div>
                        <p class="md:col-span-3 text-[11px] leading-5 text-slate-500 dark:text-slate-400">Use this if the request log grows too large or a bridge crash leaves requests stuck in pending. Stale pending items will be auto-closed as errors after the timeout.</p>
                    </div>
                    
                    <!-- Pending -->
                    <div id="pendingSection" class="hidden px-5 pt-4">
                        <p class="text-[10px] font-bold text-amber-600 uppercase tracking-wider mb-2">Pending Requests</p>
                        <div id="pendingList" class="space-y-2"></div>
                    </div>
                    
                    <!-- Table -->
                    <div class="overflow-x-auto px-5 py-4">
                        <table class="w-full text-left text-sm">
                            <thead>
                                <tr class="border-b border-slate-200 dark:border-slate-700">
                                    <th class="pb-3 font-semibold text-slate-500 dark:text-slate-400 text-[11px] uppercase tracking-wider">Time</th>
                                    <th class="pb-3 font-semibold text-slate-500 dark:text-slate-400 text-[11px] uppercase tracking-wider">Client</th>
                                    <th class="pb-3 font-semibold text-slate-500 dark:text-slate-400 text-[11px] uppercase tracking-wider">Type</th>
                                    <th class="pb-3 font-semibold text-slate-500 dark:text-slate-400 text-[11px] uppercase tracking-wider">Endpoint</th>
                                    <th class="pb-3 font-semibold text-slate-500 dark:text-slate-400 text-[11px] uppercase tracking-wider">Model</th>
                                    <th class="pb-3 font-semibold text-slate-500 dark:text-slate-400 text-[11px] uppercase tracking-wider text-right">In / Out Tokens</th>
                                    <th class="pb-3 font-semibold text-slate-500 dark:text-slate-400 text-[11px] uppercase tracking-wider text-right">Duration</th>
                                    <th class="pb-3 font-semibold text-slate-500 dark:text-slate-400 text-[11px] uppercase tracking-wider text-center">Status</th>
                                </tr>
                            </thead>
                            <tbody id="requestTable">
                                <tr>
                                    <td colspan="7" class="py-8 text-center text-slate-400 dark:text-slate-500 text-sm">No requests yet</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
