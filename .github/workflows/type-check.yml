name: Type check

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-mypy:
    name: Backend — mypy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-py
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend-py/pyproject.toml

      - name: Install backend (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run mypy
        run: python -m mypy app/

      - name: Run pytest
        run: pytest -q --tb=short

  frontend-tsc-eslint:
    name: Frontend — tsc + eslint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web (tsc + vite)
        run: npm run build:web

      - name: eslint
        run: npm run lint -w frontend/desktop